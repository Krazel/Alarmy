name: Alarma
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  Alarma:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Shared
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Assets.xcassets
          - "*.png"
    dependencies:
      - target: AlarmaLiveActivityExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmkr.alarma
        PRODUCT_NAME: Alarma
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
  AlarmaLiveActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - LiveActivity
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmkr.alarma.liveactivity
        PRODUCT_NAME: AlarmaLiveActivityExtension
        INFOPLIST_FILE: LiveActivity/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        APPLICATION_EXTENSION_API_ONLY: YES
