name: Build unsigned iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Prepare web bundle
        run: npm run build

      - name: Create iOS project
        run: npx cap add ios

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Configure AlarmKit usage description
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSAlarmKitUsageDescription string We'll schedule alarm alerts you create in Alarma." ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :NSAlarmKitUsageDescription We'll schedule alarm alerts you create in Alarma." ios/App/App/Info.plist

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios -path '*Release-iphoneos/*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" "unsigned-ipa/Payload/$(basename "$APP_PATH")"
          (cd unsigned-ipa && zip -qry ../Alarma-unsigned.ipa Payload)
          ls -lh Alarma-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alarma-unsigned-ipa
          path: Alarma-unsigned.ipa
          retention-days: 3
