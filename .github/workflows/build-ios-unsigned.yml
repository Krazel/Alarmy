name: Build unsigned iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate native Xcode project
        working-directory: native-ios
        run: xcodegen generate

      - name: Build unsigned iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -project native-ios/Alarma.xcodeproj \
            -scheme Alarma \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios -path '*Release-iphoneos/*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" "unsigned-ipa/Payload/$(basename "$APP_PATH")"
          (cd unsigned-ipa && zip -qry ../Alarma-unsigned.ipa Payload)
          ls -lh Alarma-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alarma-unsigned-ipa
          path: Alarma-unsigned.ipa
          retention-days: 3

      - name: Publish latest IPA release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cp Alarma-unsigned.ipa Alarma-iPhone-latest.ipa
          if gh release view latest-ipa >/dev/null 2>&1; then
            gh release upload latest-ipa Alarma-iPhone-latest.ipa --clobber
          else
            gh release create latest-ipa Alarma-iPhone-latest.ipa \
              --title "Latest unsigned iOS IPA" \
              --notes "Latest unsigned IPA built from ${GITHUB_SHA}." \
              --latest
          fi
